version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # Correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck

    # Error handling
    - errorlint

    # Style & readability
    - revive
    - misspell
    - godot
    - usestdlibvars

    # Code quality
    - gocritic
    - unconvert
    - prealloc
    - exhaustive
    - nolintlint

    # Complexity
    - gocognit
    - cyclop

    # Testing
    - testifylint
    - thelper

    # Security
    - gosec

  settings:
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: context-as-argument
        - name: context-keys-type
        - name: if-return
        - name: early-return
        - name: unreachable-code
        - name: unnecessary-stmt

    godot:
      scope: declarations
      period: true

    gocognit:
      min-complexity: 30

    cyclop:
      max-complexity: 13

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy

    gosec:
      excludes:
        - G104  # covered by errcheck

    testifylint:
      enable-all: true

    exhaustive:
      default-signifies-exhaustive: true

    nolintlint:
      require-explanation: true
      require-specific: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sierikov/audiobookshelf-mcp

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
