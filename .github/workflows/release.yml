name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o audiobookshelf-mcp-linux-amd64      ./cmd/audiobookshelf-mcp
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o audiobookshelf-mcp-linux-arm64      ./cmd/audiobookshelf-mcp
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o audiobookshelf-mcp-macos-amd64      ./cmd/audiobookshelf-mcp
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o audiobookshelf-mcp-macos-arm64      ./cmd/audiobookshelf-mcp
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o audiobookshelf-mcp-windows-amd64.exe ./cmd/audiobookshelf-mcp

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            audiobookshelf-mcp-linux-amd64
            audiobookshelf-mcp-linux-arm64
            audiobookshelf-mcp-macos-amd64
            audiobookshelf-mcp-macos-arm64
            audiobookshelf-mcp-windows-amd64.exe
